replicaCount: 1

api:
  enabled: true

image:
  repository: ghcr.io/grafana/sigil
  pullPolicy: Always
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  annotations: {}
  ports:
    http: 8080
    otlpGrpc: 4317

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: sigil.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

startupProbe:
  enabled: false
  httpGet:
    path: /healthz
    port: http
  failureThreshold: 30
  periodSeconds: 5

sigil:
  target: all
  auth:
    enabled: true
    fakeTenantID: fake
  queryProxy:
    prometheusBaseURL: http://prometheus:9090
    tempoBaseURL: http://tempo:3200
    timeout: 30s
  grafana:
    url: ""
    serviceAccountToken: ""
    tempoDatasourceUID: ""
  storage:
    backend: mysql
    mysql:
      # Override DSN when using an external MySQL instance.
      # If left empty and mysql.enabled=true, the chart generates DSN from mysql.* values.
      dsn: ""
  objectStore:
    backend: s3
    bucket: sigil
    s3:
      # Leave empty to auto-wire in-cluster MinIO when minio.enabled=true.
      endpoint: ""
      region: ""
      insecure: true
      useAWSSDKAuth: false
      # Optional explicit credentials; leave empty to use MinIO defaults for local chart installs.
      accessKey: ""
      secretKey: ""
    gcs:
      bucket: ""
      serviceAccount: ""
      useGRPC: false
    azure:
      container: ""
      storageAccountName: ""
      storageAccountKey: ""
      storageConnectionString: ""
      endpoint: blob.core.windows.net
      createContainer: true
  compactor:
    compactInterval: 1m
    truncateInterval: 5m
    retention: 1h
    batchSize: 1000
    leaseTTL: 30s
    shardCount: 8
    shardWindowSeconds: 60
    workers: 4
    cycleBudget: 30s
    claimTTL: 5m
    targetBlockBytes: 67108864
  modelCards:
    syncInterval: 30m
    leaseTTL: 2m
    sourceTimeout: 15s
    staleSoft: 2h
    staleHard: 24h
    bootstrapMode: snapshot-first
  extraEnv: []
  extraEnvFrom: []

command: []
args: []
extraVolumeMounts: []
extraVolumes: []

catalogSync:
  enabled: false
  replicaCount: 1
  target: catalog-sync
  service:
    enabled: true
    type: ClusterIP
    annotations: {}
    ports:
      http: 8080
  podAnnotations: {}
  podLabels: {}
  resources: {}
  extraEnv: []
  extraEnvFrom: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingester:
  enabled: false
  replicaCount: 1
  target: ingester
  service:
    enabled: true
    type: ClusterIP
    annotations: {}
    ports:
      http: 8080
      otlpGrpc: 4317
  podAnnotations: {}
  podLabels: {}
  resources: {}
  extraEnv: []
  extraEnvFrom: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

querier:
  enabled: false
  replicaCount: 1
  target: querier
  service:
    enabled: true
    type: ClusterIP
    annotations: {}
    ports:
      http: 8080
  podAnnotations: {}
  podLabels: {}
  resources: {}
  extraEnv: []
  extraEnvFrom: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

compactor:
  enabled: false
  replicaCount: 1
  target: compactor
  service:
    enabled: true
    type: ClusterIP
    annotations: {}
    ports:
      http: 8080
  podAnnotations: {}
  podLabels: {}
  resources: {}
  extraEnv: []
  extraEnvFrom: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

evalWorker:
  enabled: false
  replicaCount: 1
  target: eval-worker
  service:
    enabled: true
    type: ClusterIP
    annotations: {}
    ports:
      http: 8080
  podAnnotations: {}
  podLabels: {}
  resources: {}
  extraEnv: []
  extraEnvFrom: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

mysql:
  enabled: true
  image:
    repository: mysql
    tag: "8.4"
    pullPolicy: IfNotPresent
  auth:
    database: sigil
    user: sigil
    password: sigil
    rootPassword: rootpass
    existingSecret: ""
    passwordKey: password
    rootPasswordKey: root-password
  service:
    port: 3306
  persistence:
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 8Gi
    storageClass: ""
  extraArgs: "--max_connections=1000"
  resources: {}

tempo:
  enabled: true
  image:
    repository: grafana/tempo
    tag: "2.10.0"
    pullPolicy: IfNotPresent
  service:
    ports:
      query: 3200
      grpc: 4317
      http: 4318
  persistence:
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 8Gi
    storageClass: ""
  resources: {}
  config: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc: {}
            http: {}

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1048576
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 24h

    storage:
      trace:
        backend: local
        wal:
          path: /var/tempo/wal
        local:
          path: /var/tempo/traces

    overrides:
      defaults: {}

alloy:
  enabled: true
  image:
    repository: grafana/alloy
    tag: "v1.8.3"
    pullPolicy: IfNotPresent
  service:
    ports:
      otlpGrpc: 4317
      otlpHttp: 4318
      http: 12345
  resources: {}
  auth:
    enabled: false
    tenantID: ""
    bearerToken: ""
  outputs:
    tempo:
      endpoint: ""
      insecure: true
    prometheus:
      endpoint: ""
      insecure: true
  config: |
    logging {
      level = "info"
    }

    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "k8s_namespace_name"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "k8s_pod_name"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "k8s_container_name"
      }
    }

    otelcol.receiver.otlp "default" {
      grpc {
        endpoint = "0.0.0.0:4317"
      }

      http {
        endpoint = "0.0.0.0:4318"
      }

      output {
        traces  = [otelcol.processor.batch.default.input]
        metrics = [otelcol.processor.batch.default.input]
      }
    }

    otelcol.processor.batch "default" {
      output {
        traces  = [otelcol.exporter.otlp.tempo.input]
        metrics = [otelcol.exporter.otlphttp.prometheus.input]
      }
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "{{ include "sigil.alloy.tempoEndpoint" . }}"
        tls {
          insecure = {{ ternary "true" "false" .Values.alloy.outputs.tempo.insecure }}
        }
        {{- if .Values.alloy.auth.enabled }}
        headers = {
          "X-Scope-OrgID" = "{{ .Values.alloy.auth.tenantID }}"
          {{- if .Values.alloy.auth.bearerToken }}
          "Authorization" = "Bearer {{ .Values.alloy.auth.bearerToken }}"
          {{- end }}
        }
        {{- end }}
      }
    }

    otelcol.exporter.otlphttp "prometheus" {
      client {
        endpoint = "{{ include "sigil.alloy.prometheusEndpoint" . }}"
        tls {
          insecure = {{ ternary "true" "false" .Values.alloy.outputs.prometheus.insecure }}
        }
        {{- if .Values.alloy.auth.enabled }}
        headers = {
          "X-Scope-OrgID" = "{{ .Values.alloy.auth.tenantID }}"
          {{- if .Values.alloy.auth.bearerToken }}
          "Authorization" = "Bearer {{ .Values.alloy.auth.bearerToken }}"
          {{- end }}
        }
        {{- end }}
      }
    }

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: "v2.55.1"
    pullPolicy: IfNotPresent
  service:
    port: 9090
  persistence:
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 8Gi
    storageClass: ""
  resources: {}
  retention: 24h
  config: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
      {{- if .Values.api.enabled }}
      - job_name: sigil-api
        static_configs:
          - targets:
              - {{ include "sigil.fullname" . }}:{{ .Values.service.ports.http }}
      {{- end }}
      {{- if and .Values.ingester.enabled .Values.ingester.service.enabled }}
      - job_name: sigil-ingester
        static_configs:
          - targets:
              - {{ include "sigil.fullname" . }}-ingester:{{ .Values.ingester.service.ports.http }}
      {{- end }}
      {{- if and .Values.querier.enabled .Values.querier.service.enabled }}
      - job_name: sigil-querier
        static_configs:
          - targets:
              - {{ include "sigil.fullname" . }}-querier:{{ .Values.querier.service.ports.http }}
      {{- end }}
      {{- if and .Values.compactor.enabled .Values.compactor.service.enabled }}
      - job_name: sigil-compactor
        static_configs:
          - targets:
              - {{ include "sigil.fullname" . }}-compactor:{{ .Values.compactor.service.ports.http }}
      {{- end }}
      {{- if and .Values.evalWorker.enabled .Values.evalWorker.service.enabled }}
      - job_name: sigil-eval-worker
        static_configs:
          - targets:
              - {{ include "sigil.fullname" . }}-eval-worker:{{ .Values.evalWorker.service.ports.http }}
      {{- end }}
      {{- if and .Values.catalogSync.enabled .Values.catalogSync.service.enabled }}
      - job_name: sigil-catalog-sync
        static_configs:
          - targets:
              - {{ include "sigil.fullname" . }}-catalog-sync:{{ .Values.catalogSync.service.ports.http }}
      {{- end }}

minio:
  # Enabled by default so Helm installs work out of the box with object storage.
  enabled: true
  image:
    repository: minio/minio
    tag: "RELEASE.2025-01-20T14-49-07Z"
    pullPolicy: IfNotPresent
  rootUser: minioadmin
  rootPassword: minioadmin
  existingSecret: ""
  secretKeys:
    rootUser: root-user
    rootPassword: root-password
  service:
    apiPort: 9000
    consolePort: 9001
  persistence:
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClass: ""
  resources: {}

tests:
  enabled: true
  image:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent

nodeSelector: {}
tolerations: []
affinity: {}
