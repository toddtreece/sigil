{{- if .Values.tempo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sigil.tempo.fullname" . }}
  labels:
    {{- include "sigil.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sigil.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tempo
  template:
    metadata:
      labels:
        {{- include "sigil.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tempo
    spec:
      containers:
        - name: tempo
          image: "{{ .Values.tempo.image.repository }}:{{ .Values.tempo.image.tag }}"
          imagePullPolicy: {{ .Values.tempo.image.pullPolicy }}
          args:
            - -config.file=/etc/tempo/tempo.yaml
          ports:
            - name: query
              containerPort: {{ .Values.tempo.service.ports.query }}
              protocol: TCP
            - name: otlp-grpc
              containerPort: {{ .Values.tempo.service.ports.grpc }}
              protocol: TCP
            - name: otlp-http
              containerPort: {{ .Values.tempo.service.ports.http }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: query
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: query
            initialDelaySeconds: 20
            periodSeconds: 20
          {{- with .Values.tempo.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tempo-config
              mountPath: /etc/tempo/tempo.yaml
              subPath: tempo.yaml
            - name: tempo-data
              mountPath: /var/tempo
      volumes:
        - name: tempo-config
          configMap:
            name: {{ include "sigil.tempo.fullname" . }}
        - name: tempo-data
          {{- if .Values.tempo.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-data" (include "sigil.tempo.fullname" .)) .Values.tempo.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
