apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sigil.fullname" . }}
  labels:
    {{- include "sigil.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sigil.apiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sigil.apiSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "sigil.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sigil
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.ports.http }}
              protocol: TCP
            - name: otlp-grpc
              containerPort: {{ .Values.service.ports.otlpGrpc }}
              protocol: TCP
          env:
            - name: SIGIL_HTTP_ADDR
              value: ":{{ .Values.service.ports.http }}"
            - name: SIGIL_OTLP_GRPC_ADDR
              value: ":{{ .Values.service.ports.otlpGrpc }}"
            - name: SIGIL_TARGET
              value: {{ .Values.sigil.target | quote }}
            - name: SIGIL_AUTH_ENABLED
              value: {{ ternary "true" "false" .Values.sigil.auth.enabled | quote }}
            - name: SIGIL_FAKE_TENANT_ID
              value: {{ .Values.sigil.auth.fakeTenantID | quote }}
            - name: SIGIL_QUERY_PROXY_PROMETHEUS_BASE_URL
              value: {{ .Values.sigil.queryProxy.prometheusBaseURL | quote }}
            - name: SIGIL_QUERY_PROXY_TEMPO_BASE_URL
              value: {{ .Values.sigil.queryProxy.tempoBaseURL | quote }}
            - name: SIGIL_QUERY_PROXY_TIMEOUT
              value: {{ .Values.sigil.queryProxy.timeout | quote }}
            - name: SIGIL_STORAGE_BACKEND
              value: {{ .Values.sigil.storage.backend | quote }}
            {{- if eq (lower .Values.sigil.storage.backend) "mysql" }}
            - name: SIGIL_MYSQL_DSN
              value: {{ include "sigil.mysql.dsn" . | quote }}
            {{- end }}
            - name: SIGIL_OBJECT_STORE_BACKEND
              value: {{ .Values.sigil.objectStore.backend | lower | quote }}
            - name: SIGIL_OBJECT_STORE_BUCKET
              value: {{ .Values.sigil.objectStore.bucket | quote }}
            - name: SIGIL_OBJECT_STORE_ENDPOINT
              value: {{ include "sigil.objectStore.s3Endpoint" . | quote }}
            - name: SIGIL_OBJECT_STORE_S3_REGION
              value: {{ .Values.sigil.objectStore.s3.region | quote }}
            - name: SIGIL_OBJECT_STORE_INSECURE
              value: {{ ternary "true" "false" .Values.sigil.objectStore.s3.insecure | quote }}
            - name: SIGIL_OBJECT_STORE_S3_AWS_SDK_AUTH
              value: {{ ternary "true" "false" .Values.sigil.objectStore.s3.useAWSSDKAuth | quote }}
            {{- if .Values.sigil.objectStore.s3.accessKey }}
            - name: SIGIL_OBJECT_STORE_ACCESS_KEY
              value: {{ .Values.sigil.objectStore.s3.accessKey | quote }}
            {{- else if and .Values.minio.enabled (eq (lower .Values.sigil.objectStore.backend) "s3") }}
            - name: SIGIL_OBJECT_STORE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sigil.minio.secretName" . }}
                  key: {{ .Values.minio.secretKeys.rootUser }}
            {{- end }}
            {{- if .Values.sigil.objectStore.s3.secretKey }}
            - name: SIGIL_OBJECT_STORE_SECRET_KEY
              value: {{ .Values.sigil.objectStore.s3.secretKey | quote }}
            {{- else if and .Values.minio.enabled (eq (lower .Values.sigil.objectStore.backend) "s3") }}
            - name: SIGIL_OBJECT_STORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sigil.minio.secretName" . }}
                  key: {{ .Values.minio.secretKeys.rootPassword }}
            {{- end }}
            - name: SIGIL_OBJECT_STORE_GCS_BUCKET
              value: {{ .Values.sigil.objectStore.gcs.bucket | quote }}
            - name: SIGIL_OBJECT_STORE_GCS_SERVICE_ACCOUNT
              value: {{ .Values.sigil.objectStore.gcs.serviceAccount | quote }}
            - name: SIGIL_OBJECT_STORE_GCS_USE_GRPC
              value: {{ ternary "true" "false" .Values.sigil.objectStore.gcs.useGRPC | quote }}
            - name: SIGIL_OBJECT_STORE_AZURE_CONTAINER
              value: {{ .Values.sigil.objectStore.azure.container | quote }}
            - name: SIGIL_OBJECT_STORE_AZURE_STORAGE_ACCOUNT
              value: {{ .Values.sigil.objectStore.azure.storageAccountName | quote }}
            - name: SIGIL_OBJECT_STORE_AZURE_STORAGE_ACCOUNT_KEY
              value: {{ .Values.sigil.objectStore.azure.storageAccountKey | quote }}
            - name: SIGIL_OBJECT_STORE_AZURE_STORAGE_CONNECTION_STRING
              value: {{ .Values.sigil.objectStore.azure.storageConnectionString | quote }}
            - name: SIGIL_OBJECT_STORE_AZURE_ENDPOINT
              value: {{ .Values.sigil.objectStore.azure.endpoint | quote }}
            - name: SIGIL_OBJECT_STORE_AZURE_CREATE_CONTAINER
              value: {{ ternary "true" "false" .Values.sigil.objectStore.azure.createContainer | quote }}
            - name: SIGIL_COMPACTOR_COMPACT_INTERVAL
              value: {{ .Values.sigil.compactor.compactInterval | quote }}
            - name: SIGIL_COMPACTOR_TRUNCATE_INTERVAL
              value: {{ .Values.sigil.compactor.truncateInterval | quote }}
            - name: SIGIL_COMPACTOR_RETENTION
              value: {{ .Values.sigil.compactor.retention | quote }}
            - name: SIGIL_COMPACTOR_BATCH_SIZE
              value: {{ .Values.sigil.compactor.batchSize | quote }}
            - name: SIGIL_COMPACTOR_LEASE_TTL
              value: {{ .Values.sigil.compactor.leaseTTL | quote }}
            - name: SIGIL_COMPACTOR_SHARD_COUNT
              value: {{ .Values.sigil.compactor.shardCount | quote }}
            - name: SIGIL_COMPACTOR_SHARD_WINDOW_SECONDS
              value: {{ .Values.sigil.compactor.shardWindowSeconds | quote }}
            - name: SIGIL_COMPACTOR_WORKERS
              value: {{ .Values.sigil.compactor.workers | quote }}
            - name: SIGIL_COMPACTOR_CYCLE_BUDGET
              value: {{ .Values.sigil.compactor.cycleBudget | quote }}
            - name: SIGIL_COMPACTOR_CLAIM_TTL
              value: {{ .Values.sigil.compactor.claimTTL | quote }}
            - name: SIGIL_COMPACTOR_TARGET_BLOCK_BYTES
              value: {{ .Values.sigil.compactor.targetBlockBytes | quote }}
            - name: SIGIL_MODEL_CARDS_SYNC_INTERVAL
              value: {{ .Values.sigil.modelCards.syncInterval | quote }}
            - name: SIGIL_MODEL_CARDS_LEASE_TTL
              value: {{ .Values.sigil.modelCards.leaseTTL | quote }}
            - name: SIGIL_MODEL_CARDS_SOURCE_TIMEOUT
              value: {{ .Values.sigil.modelCards.sourceTimeout | quote }}
            - name: SIGIL_MODEL_CARDS_STALE_SOFT
              value: {{ .Values.sigil.modelCards.staleSoft | quote }}
            - name: SIGIL_MODEL_CARDS_STALE_HARD
              value: {{ .Values.sigil.modelCards.staleHard | quote }}
            - name: SIGIL_MODEL_CARDS_BOOTSTRAP_MODE
              value: {{ .Values.sigil.modelCards.bootstrapMode | quote }}
            {{- with .Values.sigil.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.sigil.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.httpGet.path }}
              port: {{ .Values.startupProbe.httpGet.port }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
