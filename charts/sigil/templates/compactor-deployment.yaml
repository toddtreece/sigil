{{- if .Values.compactor.enabled }}
{{ include "sigil.validateStorageBackend" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sigil.fullname" . }}-compactor
  labels:
    {{- include "sigil.labels" . | nindent 4 }}
    app.kubernetes.io/component: compactor
spec:
  replicas: {{ .Values.compactor.replicaCount }}
  selector:
    matchLabels:
      {{- include "sigil.compactorSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sigil.compactorSelectorLabels" . | nindent 8 }}
        {{- with .Values.compactor.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.compactor.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "sigil.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: compactor
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.compactor.service.ports.http }}
              protocol: TCP
          env:
            {{- include "sigil.commonEnv" (dict "root" . "target" .Values.compactor.target "extraEnv" .Values.compactor.extraEnv "httpPort" .Values.compactor.service.ports.http) | nindent 12 }}
          {{- if or .Values.sigil.extraEnvFrom .Values.compactor.extraEnvFrom }}
          envFrom:
            {{- with .Values.sigil.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.compactor.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.compactor.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.compactor.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.compactor.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.compactor.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
