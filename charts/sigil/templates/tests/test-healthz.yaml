{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "sigil.fullname" . }}-test-healthz
  labels:
    {{- include "sigil.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: "{{ .Values.tests.image.repository }}:{{ .Values.tests.image.tag }}"
      imagePullPolicy: {{ .Values.tests.image.pullPolicy }}
      command: ["sh", "-ec"]
      args:
        - |
          wget -qO- "http://{{ include "sigil.fullname" . }}:{{ .Values.service.ports.http }}/healthz"
{{- end }}
