{{- if .Values.evalWorker.enabled }}
{{ include "sigil.validateStorageBackend" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sigil.fullname" . }}-eval-worker
  labels:
    {{- include "sigil.labels" . | nindent 4 }}
    app.kubernetes.io/component: eval-worker
spec:
  replicas: {{ .Values.evalWorker.replicaCount }}
  selector:
    matchLabels:
      {{- include "sigil.evalWorkerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sigil.evalWorkerSelectorLabels" . | nindent 8 }}
        {{- with .Values.evalWorker.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.evalWorker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "sigil.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: eval-worker
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.evalWorker.service.ports.http }}
              protocol: TCP
          env:
            {{- include "sigil.commonEnv" (dict "root" . "target" .Values.evalWorker.target "extraEnv" .Values.evalWorker.extraEnv "httpPort" .Values.evalWorker.service.ports.http) | nindent 12 }}
          {{- if or .Values.sigil.extraEnvFrom .Values.evalWorker.extraEnvFrom }}
          envFrom:
            {{- with .Values.sigil.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.evalWorker.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.evalWorker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.evalWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.evalWorker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.evalWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
