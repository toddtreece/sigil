[settings]
experimental = true

[env]
_.file = ".env"
GOTOOLCHAIN = "go1.25.7+auto"

[tools]
node = "24"
go = "1.26.1"
java = "temurin-17"
helm = "3.19.0"
dotnet = "8.0.418"
"go:github.com/magefile/mage" = "v1.16.0"
"go:github.com/air-verse/air" = "v1.64.5"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "v2.11.2"
"go:github.com/matryer/moq" = "v0.6.0"

[tasks.help]
description = "Show available tasks"
run = "mise tasks"

[tasks.deps]
description = "Install workspace dependencies"
run = """
#!/usr/bin/env bash
set -euo pipefail
corepack enable pnpm
pnpm install
"""

[tasks."doctor:go"]
description = "Verify Go toolchain matches workspace requirements"
run = """
#!/usr/bin/env bash
set -euo pipefail

required_go_version="go1.25.7"
required_go_work_version="1.25.7"

actual_go_version="$(go env GOVERSION)"
if [[ "${actual_go_version}" != "${required_go_version}" ]]; then
  cat <<EOF
Go toolchain mismatch: expected ${required_go_version}, got ${actual_go_version}.
Run:
  mise install
  go env -w GOTOOLCHAIN=${required_go_version}+auto
EOF
  exit 1
fi

go_work_version="$(awk '$1 == "go" { print $2; exit }' go.work)"
if [[ "${go_work_version}" != "${required_go_work_version}" ]]; then
  echo "go.work mismatch: expected go ${required_go_work_version}, got ${go_work_version}"
  exit 1
fi
"""

[tasks."dev:plugin"]
description = "Run plugin webpack watch"
dir = "apps/plugin"
run = "pnpm run dev"

[tasks."dev:api"]
description = "Run Sigil service with air"
dir = "sigil"
run = "air -c .air.toml"

[tasks."dev:storybook"]
description = "Run plugin Storybook"
dir = "apps/plugin"
run = "pnpm run storybook"

[tasks.up]
description = "Start local development stack with DEVELOPMENT=true (grafana, plugin, sigil, sdk-traffic, alloy, tempo, prometheus, mysql, minio)"
run = "DEVELOPMENT=true docker compose --profile core --profile traffic up --watch --build --remove-orphans"

[tasks."up:object"]
description = "Backward-compatible alias for `mise run up` with DEVELOPMENT=true"
run = "DEVELOPMENT=true docker compose --profile core --profile traffic up --watch --build --remove-orphans"

[tasks."up:detached"]
description = "Start local development stack in detached mode with DEVELOPMENT=true"
run = "DEVELOPMENT=true docker compose --profile core --profile traffic up --build --remove-orphans -d"

[tasks."up:worktree"]
description = "Start a lighter worktree-friendly stack without sdk-traffic and with webpack typecheck/lint disabled in Docker"
run = "./scripts/run-sigil-worktree.sh up"

[tasks."up:worktree:detached"]
description = "Start a lighter detached worktree-friendly stack without sdk-traffic and with webpack typecheck/lint disabled in Docker"
run = "./scripts/run-sigil-worktree.sh up-detached"

[tasks."up:worktree:traffic-lite"]
description = "Start a low-volume synthetic traffic sidecar for the current worktree stack"
run = "./scripts/run-sigil-worktree.sh up-traffic-lite"

[tasks."workflow:symphony:render"]
description = "Render WORKFLOW.local.md from the committed Symphony template using SYMPHONY_LINEAR_PROJECT_SLUG"
run = "./scripts/render-symphony-workflow.sh"

[tasks."down:worktree"]
description = "Stop the worktree-friendly stack"
run = "./scripts/run-sigil-worktree.sh down"

[tasks."down:worktree:destroy"]
description = "Stop the worktree-friendly stack and remove its volumes/orphans"
run = "./scripts/run-sigil-worktree.sh destroy"

[tasks."down:worktree:traffic-lite"]
description = "Stop the low-volume synthetic traffic sidecar for the current worktree stack"
run = "./scripts/run-sigil-worktree.sh down-traffic-lite"

[tasks."logs:worktree"]
description = "Tail logs for the worktree-friendly stack"
run = "./scripts/run-sigil-worktree.sh logs"

[tasks."ps:worktree"]
description = "Show containers and URLs for the worktree-friendly stack"
run = "./scripts/run-sigil-worktree.sh ps"

[tasks."up:dev"]
description = "Start local development stack without sdk-traffic, pointing to dev datasources"
run = "DEVELOPMENT=true SIGIL_API_URL=https://sigil-dev-001.grafana-dev.net/ SIGIL_TENANT_ID=13 SIGIL_PROM_DS_UID=cortex-dev-01 SIGIL_TEMPO_DS_UID=tempo-dev-01 docker compose --profile core up --watch --build --remove-orphans"

[tasks."up:ops"]
description = "Start local development stack without sdk-traffic, pointing to ops datasources"
run = "DEVELOPMENT=true SIGIL_API_URL=https://sigil-ops-001.grafana-ops.net/ SIGIL_TENANT_ID=27821 SIGIL_API_AUTH_TOKEN=$SIGIL_API_AUTH_TOKEN_OPS SIGIL_PROM_DS_UID=grafanacloud-prom SIGIL_TEMPO_DS_UID=grafanacloud-traces docker compose --profile core up --watch --build --remove-orphans"

[tasks."up:build"]
description = "Start local development stack with DEVELOPMENT=true and force image rebuilds"
run = "DEVELOPMENT=true docker compose --profile core --profile traffic up --watch --build --remove-orphans"

[tasks.down]
description = "Stop local stack"
run = "docker compose down"

[tasks.nuke]
description = "Delete all Docker containers and volumes"
run = """
#!/usr/bin/env bash
set -euo pipefail

container_ids="$(docker ps -aq)"
if [[ -n "${container_ids}" ]]; then
  docker rm -f ${container_ids}
fi

volume_ids="$(docker volume ls -q)"
if [[ -n "${volume_ids}" ]]; then
  docker volume rm ${volume_ids}
fi
"""

[tasks.logs]
description = "Tail local stack logs"
run = "docker compose logs -f"

[tasks."assistant:up"]
description = "Start grafana-assistant-app with remapped host ports"
run = "./scripts/run-assistant-offset.sh up"

[tasks."assistant:up:sigil-env"]
description = "Start remapped assistant and import SIGIL env vars"
run = "ASSISTANT_IMPORT_SIGIL_ENV=1 ./scripts/run-assistant-offset.sh up"

[tasks."assistant:down"]
description = "Stop remapped grafana-assistant-app stack"
run = "./scripts/run-assistant-offset.sh down"

[tasks."assistant:ps"]
description = "List remapped grafana-assistant-app containers"
run = "./scripts/run-assistant-offset.sh ps"

[tasks."assistant:logs"]
description = "Tail remapped grafana-assistant-app logs"
run = "./scripts/run-assistant-offset.sh logs"

[tasks.format]
description = "Format Go and TypeScript code"
alias = "fmt"
depends = ["format:go", "format:ts", "format:cs"]

[tasks."format:go"]
description = "Format Go code in all modules"
depends = ["doctor:go"]
run = """
#!/usr/bin/env bash
set -euo pipefail
while IFS= read -r moddir; do
  echo "==> go fmt ${moddir}"
  (cd "${moddir}" && GOWORK=off go fmt ./...)
done < <(find . -name go.mod -not -path './node_modules/*' -exec dirname {} \\; | sort)
"""

[tasks."format:ts"]
description = "Apply TypeScript lint fixes and formatting"
run = "pnpm --filter @grafana/sigil-plugin run lint:fix"

[tasks."format:check"]
description = "Check Go and TypeScript formatting without modifying files"
depends = ["format:check:go", "format:check:ts"]

[tasks."format:check:go"]
description = "Verify Go files are formatted with gofmt"
depends = ["doctor:go"]
run = """
#!/usr/bin/env bash
set -euo pipefail
unformatted=""
while IFS= read -r go_file; do
  file_output="$(gofmt -l "${go_file}")"
  if [[ -n "${file_output}" ]]; then
    unformatted+="${file_output}"$'\\n'
  fi
done < <(find . -name '*.go' -not -path './node_modules/*' | sort)

if [[ -n "${unformatted}" ]]; then
  cat <<EOF
The following Go files are not formatted:
${unformatted}

Run: mise run format:go
EOF
  exit 1
fi
"""

[tasks."format:check:ts"]
description = "Verify TypeScript plugin files are formatted with Prettier"
run = "pnpm --filter @grafana/sigil-plugin exec prettier --check ."

[tasks."format:cs"]
description = "Format .NET SDK code"
run = "dotnet format sdks/dotnet/Sigil.DotNet.sln"

[tasks.lint]
description = "Run formatting checks, Go, TypeScript, Helm, .NET linting, and TypeScript type checks"
depends = ["format:check", "lint:go", "lint:ts", "lint:helm", "lint:cs", "typecheck"]

[tasks."lint:go"]
description = "Lint Go code in all modules"
depends = ["doctor:go"]
run = """
#!/usr/bin/env bash
set -euo pipefail
while IFS= read -r moddir; do
  if [[ -z "$(cd "${moddir}" && GOWORK=off go list ./... 2>/dev/null || true)" ]]; then
    echo "==> skip golangci-lint ${moddir} (no Go packages)"
    continue
  fi
  echo "==> golangci-lint ${moddir}"
  (cd "${moddir}" && GOWORK=off golangci-lint run ./...)
done < <(find . -name go.mod -not -path './node_modules/*' -exec dirname {} \\; | sort)
"""

[tasks."lint:ts"]
description = "Lint TypeScript plugin code"
run = "pnpm --filter @grafana/sigil-plugin run lint"

[tasks."lint:helm"]
description = "Lint Sigil Helm chart"
run = "helm lint ./charts/sigil"

[tasks."lint:cs"]
description = "Verify .NET SDK formatting and analyzer checks"
run = "dotnet format sdks/dotnet/Sigil.DotNet.sln --verify-no-changes"

[tasks.typecheck]
description = "Run TypeScript type checks"
depends = ["typecheck:ts:plugin", "typecheck:ts:sdk-js"]

[tasks."typecheck:ts:plugin"]
description = "Type-check plugin TypeScript code"
run = "pnpm --filter @grafana/sigil-plugin run typecheck"

[tasks."typecheck:ts:sdk-js"]
description = "Type-check TypeScript/JavaScript SDK code"
depends = ["deps"]
run = "pnpm --filter @grafana/sigil-sdk-js run typecheck"

[tasks.test]
description = "Run plugin, Sigil, SDK, and Helm tests"
depends = ["doctor:go"]
run = """
#!/usr/bin/env bash
set -euo pipefail
pnpm --filter @grafana/sigil-plugin run test:ci
cd sigil && GOWORK=off go test ./...
cd ../apps/plugin
if [[ -n "$(GOWORK=off go list ./... 2>/dev/null || true)" ]]; then
  GOWORK=off go test ./...
else
  echo "==> skip go test ./apps/plugin (no Go packages)"
fi
cd ..
mise run test:go:sdk-core
mise run test:go:sdk-anthropic
mise run test:go:sdk-openai
mise run test:go:sdk-gemini
mise run test:ts:sdk-js
mise run test:helm
"""

[tasks."test:helm"]
description = "Run Helm chart render tests"
run = """
#!/usr/bin/env bash
set -euo pipefail

helm lint ./charts/sigil

helm template sigil ./charts/sigil >/dev/null

helm template sigil ./charts/sigil \
  --set mysql.enabled=false \
  --set alloy.enabled=false \
  --set tempo.enabled=false \
  --set prometheus.enabled=false \
  --set minio.enabled=false \
  --set sigil.storage.mysql.dsn='sigil:sigil@tcp(mysql.example:3306)/sigil?parseTime=true' \
  --set sigil.objectStore.backend='s3' \
  --set sigil.objectStore.bucket='sigil' \
  --set sigil.objectStore.s3.endpoint='https://object-store.example' >/dev/null

helm template sigil ./charts/sigil \
  --set minio.enabled=true >/dev/null

helm template sigil ./charts/sigil \
  --set minio.enabled=false \
  --set sigil.objectStore.backend='gcs' \
  --set sigil.objectStore.bucket='sigil-gcs' \
  --set sigil.objectStore.gcs.bucket='sigil-gcs' >/dev/null

helm template sigil ./charts/sigil \
  --set minio.enabled=false \
  --set sigil.objectStore.backend='azure' \
  --set sigil.objectStore.bucket='sigil' \
  --set sigil.objectStore.azure.container='sigil' \
  --set sigil.objectStore.azure.storageAccountName='account' \
  --set sigil.objectStore.azure.storageAccountKey='secret' >/dev/null

helm template sigil ./charts/sigil \
  --set api.enabled=false \
  --set ingester.enabled=true \
  --set ingester.replicaCount=2 \
  --set querier.enabled=true \
  --set querier.replicaCount=3 \
  --set compactor.enabled=true \
  --set compactor.replicaCount=2 \
  --set evalWorker.enabled=true \
  --set evalWorker.replicaCount=2 \
  --set catalogSync.enabled=true \
  --set catalogSync.replicaCount=1 \
  --set catalogSync.target=catalog-sync >/dev/null
"""

[tasks."package:helm"]
description = "Package Sigil Helm chart into dist/charts"
run = """
#!/usr/bin/env bash
set -euo pipefail
mkdir -p dist/charts
helm package ./charts/sigil --destination dist/charts
