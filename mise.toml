[tasks."test:sdk:compose-one-shot"]
description = "Run compose sdk-traffic one-shot verification with API assertions"
run = """
#!/usr/bin/env bash
set -euo pipefail
cleanup() {
  docker compose --profile core --profile traffic down --volumes >/dev/null 2>&1 || true
}
trap cleanup EXIT
docker compose --profile core --profile traffic down --volumes >/dev/null 2>&1 || true
DEVELOPMENT=true \
SIGIL_TRAFFIC_ONESHOT=1 \
SIGIL_TRAFFIC_MAX_CYCLES="${SIGIL_TRAFFIC_MAX_CYCLES:-2}" \
SIGIL_TRAFFIC_ASSERT_TIMEOUT_SECONDS="${SIGIL_TRAFFIC_ASSERT_TIMEOUT_SECONDS:-180}" \
docker compose --profile core --profile traffic up --build --abort-on-container-exit --exit-code-from sdk-traffic sdk-traffic
"""

