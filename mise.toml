[tasks."generate:mocks:go"]
description = "Generate all Go mock implementations"
depends = ["generate:mocks:sigil", "generate:mocks:plugin", "generate:mocks:sdk-go", "generate:mocks:sdk-go-providers", "generate:mocks:sdk-go-frameworks"]

