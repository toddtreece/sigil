[tasks."test:e2e:storage-local"]
description = "Run local compose-backed hot+cold storage round-trip test"
depends = ["doctor:go"]
run = """
#!/usr/bin/env bash
set -euo pipefail
cd sigil
GOWORK=off go test ./e2e -tags=e2e -run TestStorageHotColdRoundTripLocal -count=1 -v
"""

[tasks."deps:playwright"]
description = "Install Playwright browser binaries for plugin browser tests"
run = "pnpm --dir apps/plugin exec playwright install"

[tasks."capture:ui-proof"]
description = "Capture a Grafana Sigil UI screenshot from the current worktree stack"
run = "pnpm --dir apps/plugin exec node ./scripts/capture-ui-proof.mjs"

[tasks."ensure:grafana:auth"]
description = "Create a reusable authenticated Grafana Playwright session for local UI proof flows"
run = "pnpm --dir apps/plugin exec node ./scripts/ensure-grafana-auth.mjs"

[tasks."test:e2e:plugin"]
description = "Run plugin Playwright browser end-to-end tests"
run = "pnpm --dir apps/plugin exec playwright test"

[tasks."test:e2e:plugin:eval"]
description = "Run plugin Playwright evaluation validation browser tests"
run = "pnpm --dir apps/plugin exec playwright test tests/evaluationValidation.spec.ts"

[tasks."bench:storage"]
description = "Run Sigil storage benchmarks (WAL, object, compactor, fan-out)"
depends = ["doctor:go"]
run = "cd sigil && GOWORK=off go test ./internal/storage/... -run '^$' -bench . -benchmem"

[tasks."test:coverage:go"]
description = "Run Go tests with coverage report"
depends = ["doctor:go"]
run = """
#!/usr/bin/env bash
set -euo pipefail
cd sigil
GOWORK=off go test ./... -coverprofile=coverage.out -count=1
go tool cover -func=coverage.out | tail -1
echo ""
echo "View HTML report: cd sigil && go tool cover -html=coverage.out"
"""

[tasks."generate:mocks:sigil"]
description = "Generate sigil server mocks"
depends = ["doctor:go"]
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "==> generating sigil mocks"
# moq -rm -out ./sigil/internal/eval/control/mock_test.gen.go ./sigil/internal/eval/control controlStore
echo "No sigil mocks to generate yet."
"""

[tasks."generate:mocks:plugin"]
description = "Generate Grafana plugin mocks"
depends = ["doctor:go"]
run = """
