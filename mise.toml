[settings]
experimental = true

[env]
GOTOOLCHAIN = "go1.25.6+auto"

[tools]
node = "24"
go = "1.25.7"
helm = "3.19.0"
"go:github.com/magefile/mage" = "v1.15.0"
"go:github.com/air-verse/air" = "v1.64.5"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "v2.8.0"

[tasks.help]
description = "Show available tasks"
run = "mise tasks"

[tasks.deps]
description = "Install workspace dependencies"
run = """
#!/usr/bin/env bash
set -euo pipefail
corepack enable pnpm
pnpm install
"""

[tasks."doctor:go"]
description = "Verify Go toolchain matches workspace requirements"
run = """
#!/usr/bin/env bash
set -euo pipefail

required_go_version="go1.25.6"
required_go_work_version="1.25.6"

actual_go_version="$(go env GOVERSION)"
if [[ "${actual_go_version}" != "${required_go_version}" ]]; then
  cat <<EOF
Go toolchain mismatch: expected ${required_go_version}, got ${actual_go_version}.
Run:
  mise install
  go env -w GOTOOLCHAIN=${required_go_version}+auto
EOF
  exit 1
fi

go_work_version="$(awk '$1 == "go" { print $2; exit }' go.work)"
if [[ "${go_work_version}" != "${required_go_work_version}" ]]; then
  echo "go.work mismatch: expected go ${required_go_work_version}, got ${go_work_version}"
  exit 1
fi
"""

[tasks."dev:plugin"]
description = "Run plugin webpack watch"
dir = "apps/plugin"
run = "pnpm run dev"

[tasks."dev:api"]
description = "Run Sigil service with air"
dir = "sigil"
run = "air -c .air.toml"

[tasks."dev:storybook"]
description = "Run plugin Storybook"
dir = "apps/plugin"
run = "pnpm run storybook"

[tasks.up]
description = "Start local stack (grafana, plugin, sigil, tempo, mysql, minio)"
run = "docker compose --profile core up --build"

[tasks."up:object"]
description = "Backward-compatible alias for `mise run up`"
run = "docker compose --profile core up --build"

[tasks.down]
description = "Stop local stack"
run = "docker compose down"

[tasks.logs]
description = "Tail local stack logs"
run = "docker compose logs -f"

[tasks.format]
description = "Format Go and TypeScript code"
alias = "fmt"
depends = ["format:go", "format:ts"]

[tasks."format:go"]
description = "Format Go code in all modules"
depends = ["doctor:go"]
run = """
#!/usr/bin/env bash
set -euo pipefail
while IFS= read -r moddir; do
  echo "==> go fmt ${moddir}"
  (cd "${moddir}" && GOWORK=off go fmt ./...)
done < <(find . -name go.mod -not -path './node_modules/*' -exec dirname {} \\; | sort)
"""

[tasks."format:ts"]
description = "Apply TypeScript lint fixes and formatting"
run = "pnpm --filter @grafana/sigil-plugin run lint:fix"

[tasks."format:check"]
description = "Check Go and TypeScript formatting without modifying files"
depends = ["format:check:go", "format:check:ts"]

[tasks."format:check:go"]
description = "Verify Go files are formatted with gofmt"
depends = ["doctor:go"]
run = """
#!/usr/bin/env bash
set -euo pipefail
unformatted=""
while IFS= read -r go_file; do
  file_output="$(gofmt -l "${go_file}")"
  if [[ -n "${file_output}" ]]; then
    unformatted+="${file_output}"$'\\n'
  fi
done < <(find . -name '*.go' -not -path './node_modules/*' | sort)

if [[ -n "${unformatted}" ]]; then
  cat <<EOF
The following Go files are not formatted:
${unformatted}

Run: mise run format:go
EOF
  exit 1
fi
"""

[tasks."format:check:ts"]
description = "Verify TypeScript plugin files are formatted with Prettier"
run = "pnpm --filter @grafana/sigil-plugin exec prettier --check ."

[tasks.lint]
description = "Run Go, TypeScript, and Helm linting"
depends = ["lint:go", "lint:ts", "lint:helm"]

[tasks."lint:go"]
description = "Lint Go code in all modules"
depends = ["doctor:go"]
run = """
#!/usr/bin/env bash
set -euo pipefail
while IFS= read -r moddir; do
  if [[ -z "$(cd "${moddir}" && GOWORK=off go list ./... 2>/dev/null || true)" ]]; then
    echo "==> skip golangci-lint ${moddir} (no Go packages)"
    continue
  fi
  echo "==> golangci-lint ${moddir}"
  (cd "${moddir}" && GOWORK=off golangci-lint run ./...)
done < <(find . -name go.mod -not -path './node_modules/*' -exec dirname {} \\; | sort)
"""

[tasks."lint:ts"]
description = "Lint TypeScript plugin code"
run = "pnpm --filter @grafana/sigil-plugin run lint"

[tasks."lint:helm"]
description = "Lint Sigil Helm chart"
run = "helm lint ./charts/sigil"

[tasks.typecheck]
description = "Run TypeScript type checks"
depends = ["typecheck:ts:plugin", "typecheck:ts:sdk-js"]

[tasks."typecheck:ts:plugin"]
description = "Type-check plugin TypeScript code"
run = "pnpm --filter @grafana/sigil-plugin run typecheck"

[tasks."typecheck:ts:sdk-js"]
description = "Type-check TypeScript/JavaScript SDK code"
run = "pnpm --filter @grafana/sigil-sdk-js run typecheck"

[tasks.test]
description = "Run plugin, Sigil, SDK, and Helm tests"
depends = ["doctor:go"]
run = """
#!/usr/bin/env bash
set -euo pipefail
pnpm --filter @grafana/sigil-plugin run test:ci
cd sigil && GOWORK=off go test ./...
cd ../apps/plugin && GOWORK=off go test ./...
mise run test:go:sdk-core
mise run test:go:sdk-anthropic
mise run test:go:sdk-openai
mise run test:go:sdk-gemini
mise run test:ts:sdk-js
mise run test:helm
"""

[tasks."test:helm"]
description = "Run Helm chart render tests"
run = """
#!/usr/bin/env bash
set -euo pipefail

helm lint ./charts/sigil

helm template sigil ./charts/sigil >/dev/null

helm template sigil ./charts/sigil \
  --set mysql.enabled=false \
  --set tempo.enabled=false \
  --set minio.enabled=false \
  --set sigil.storage.mysql.dsn='sigil:sigil@tcp(mysql.example:3306)/sigil?parseTime=true' \
  --set sigil.tempo.grpcEndpoint='tempo.example:4317' \
  --set sigil.tempo.httpEndpoint='tempo.example:4318' \
  --set sigil.objectStore.backend='s3' \
  --set sigil.objectStore.bucket='sigil' \
  --set sigil.objectStore.s3.endpoint='https://object-store.example' >/dev/null

helm template sigil ./charts/sigil \
  --set minio.enabled=true >/dev/null

helm template sigil ./charts/sigil \
  --set minio.enabled=false \
  --set sigil.objectStore.backend='gcs' \
  --set sigil.objectStore.bucket='sigil-gcs' \
  --set sigil.objectStore.gcs.bucket='sigil-gcs' >/dev/null

helm template sigil ./charts/sigil \
  --set minio.enabled=false \
  --set sigil.objectStore.backend='azure' \
  --set sigil.objectStore.bucket='sigil' \
  --set sigil.objectStore.azure.container='sigil' \
  --set sigil.objectStore.azure.storageAccountName='account' \
  --set sigil.objectStore.azure.storageAccountKey='secret' >/dev/null

helm template sigil ./charts/sigil \
  --set sigil.target=server \
  --set replicaCount=3 \
  --set catalogSync.enabled=true \
  --set catalogSync.replicaCount=1 \
  --set catalogSync.target=catalog-sync >/dev/null
"""

[tasks."package:helm"]
description = "Package Sigil Helm chart into dist/charts"
run = """
#!/usr/bin/env bash
set -euo pipefail
mkdir -p dist/charts
helm package ./charts/sigil --destination dist/charts
"""

[tasks."model-cards:snapshot:update"]
description = "Refresh model-card snapshot from OpenRouter and write canonical fallback JSON"
depends = ["doctor:go"]
run = "cd sigil && GOWORK=off go run ./cmd/modelcards-snapshot --mode update --output ./internal/modelcards/fallback/openrouter_models.v1.json"

[tasks."model-cards:snapshot:check"]
description = "Validate model-card fallback snapshot schema, checksum, and canonical formatting"
depends = ["doctor:go"]
run = "cd sigil && GOWORK=off go run ./cmd/modelcards-snapshot --mode check --output ./internal/modelcards/fallback/openrouter_models.v1.json"

[tasks."test:go:sdk-core"]
description = "Run Go SDK core tests as standalone module"
dir = "sdks/go"
depends = ["doctor:go"]
run = "GOWORK=off go test ./..."

[tasks."test:go:sdk-anthropic"]
description = "Run Anthropic provider helper tests as standalone module"
dir = "sdks/go-providers/anthropic"
depends = ["doctor:go"]
run = "GOWORK=off go test ./..."

[tasks."test:go:sdk-openai"]
description = "Run OpenAI provider helper tests as standalone module"
dir = "sdks/go-providers/openai"
depends = ["doctor:go"]
run = "GOWORK=off go test ./..."

[tasks."test:go:sdk-gemini"]
description = "Run Gemini provider helper tests as standalone module"
dir = "sdks/go-providers/gemini"
depends = ["doctor:go"]
run = "GOWORK=off go test ./..."

[tasks."test:ts:sdk-js"]
description = "Run TypeScript/JavaScript SDK runtime tests"
run = "pnpm --filter @grafana/sigil-sdk-js run test:ci"

[tasks."test:py:sdk-core"]
description = "Run Python SDK core parity tests"
run = """
#!/usr/bin/env bash
set -euo pipefail
python3 -m venv .venv-py-sdk-core
. .venv-py-sdk-core/bin/activate
python -m pip install -q -e './sdks/python[dev]'
python -m pytest sdks/python/tests
"""

[tasks."test:py:sdk-openai"]
description = "Run Python OpenAI provider helper tests"
run = """
#!/usr/bin/env bash
set -euo pipefail
python3 -m venv .venv-py-sdk-openai
. .venv-py-sdk-openai/bin/activate
python -m pip install -q -e './sdks/python[dev]' -e './sdks/python-providers/openai[dev]'
python -m pytest sdks/python-providers/openai/tests
"""

[tasks."test:py:sdk-anthropic"]
description = "Run Python Anthropic provider helper tests"
run = """
#!/usr/bin/env bash
set -euo pipefail
python3 -m venv .venv-py-sdk-anthropic
. .venv-py-sdk-anthropic/bin/activate
python -m pip install -q -e './sdks/python[dev]' -e './sdks/python-providers/anthropic[dev]'
python -m pytest sdks/python-providers/anthropic/tests
"""

[tasks."test:py:sdk-gemini"]
description = "Run Python Gemini provider helper tests"
run = """
#!/usr/bin/env bash
set -euo pipefail
python3 -m venv .venv-py-sdk-gemini
. .venv-py-sdk-gemini/bin/activate
python -m pip install -q -e './sdks/python[dev]' -e './sdks/python-providers/gemini[dev]'
python -m pytest sdks/python-providers/gemini/tests
"""

[tasks."test:sdk:all"]
description = "Run all SDK checks (Go, TypeScript/JavaScript, and Python SDK suites)"
depends = [
  "test:go:sdk-core",
  "test:go:sdk-anthropic",
  "test:go:sdk-openai",
  "test:go:sdk-gemini",
  "test:ts:sdk-js",
  "typecheck:ts:sdk-js",
  "test:py:sdk-core",
  "test:py:sdk-openai",
  "test:py:sdk-anthropic",
  "test:py:sdk-gemini",
]

[tasks."test:go:all-modules"]
description = "Run go test across Go SDK modules"
depends = ["doctor:go"]
run = """
#!/usr/bin/env bash
set -euo pipefail
while IFS= read -r moddir; do
  echo "==> go test ${moddir}"
  (cd "${moddir}" && go test ./...)
done < <(find ./sdks -name go.mod -exec dirname {} \\; | sort)
"""

[tasks.check]
description = "Run lint, typecheck and tests"
depends = ["lint", "typecheck", "test"]

[tasks.ci]
description = "Run CI quality checks"
depends = ["format:check", "lint", "typecheck"]
