services:
  grafana:
    profiles: ['core']
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    depends_on:
      plugin:
        condition: service_healthy
      mysql:
        condition: service_healthy
      tempo:
        condition: service_started
      prometheus:
        condition: service_started
    environment:
      GF_DATABASE_TYPE: mysql
      GF_DATABASE_HOST: mysql:3306
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: sigil
      GF_DATABASE_PASSWORD: sigil
      GF_SESSION_PROVIDER: mysql
      GF_SESSION_PROVIDER_CONFIG: sigil:sigil@tcp(mysql:3306)/grafana
      GF_APP_URL: http://grafana:3000
      GF_SERVER_ROOT_URL: http://grafana:3000
      GF_FEATURE_TOGGLES_ENABLE: extensionSidebar,externalServiceAccounts,grafanaAssistantLoop,accessControlOnCall,assistantStreaming,dashboardNewLayouts,collectorApp,k8sAlloyInstructions,fleetManagement,instrumentationHub,k8sAlloyHelmInstructions,otelSupport,alertEnrichment,alertingEnrichmentAssistantInvestigations,alertingEnrichmentPerRule,grafanaAPIServer,kubeAPIServer,assistantPlaybooks,infinityAssistantTools,assistantTunnel,investigationMemorySearch,restrictedPluginApis,dashboardTemplates,suggestedDashboards,dashboardLibrary
      GRAFANA_ASSISTANT_ACCESS_TOKEN: ${GRAFANA_ASSISTANT_ACCESS_TOKEN}
      GF_INSTALL_PLUGINS: https://storage.googleapis.com/integration-artifacts/grafana-assistant-app/release/latest/grafana-assistant-app-latest.zip;grafana-assistant-app,yesoreyeram-infinity-datasource

  plugin-precache:
    profiles: ['core']
    build:
      context: .
      dockerfile: .config/Dockerfile.plugin
    volumes:
      - ./:/app/sigil
      - sigil-go-cache:/opt/go-cache
      - sigil-pnpm-store:/opt/pnpm-store
      - sigil-node-modules:/app/sigil/node_modules/
      - sigil-plugin-dist:/app/sigil/apps/plugin/dist/
    working_dir: /app/sigil
    command: sh -c "pnpm install && cd apps/plugin && GOWORK=off mage -v build:linux build:linuxarm64"

  plugin:
    profiles: ['core']
    build:
      context: .
      dockerfile: .config/Dockerfile.plugin
    restart: always
    depends_on:
      plugin-precache:
        condition: service_completed_successfully
    develop:
      watch:
        - path: package.json
          action: rebuild
        - path: pnpm-lock.yaml
          action: rebuild
        - path: apps/plugin/package.json
          action: rebuild
    ports:
      - '35729:35729'
      - '35728:35728'
    volumes:
      - ./:/app/sigil
      - sigil-go-cache:/opt/go-cache
      - sigil-pnpm-store:/opt/pnpm-store
      - sigil-node-modules:/app/sigil/node_modules/
      - sigil-plugin-dist:/app/sigil/apps/plugin/dist/
    working_dir: /app/sigil
    command: >-
      bash -lc "export PATH=/usr/local/go/bin:/opt/go/bin:$PATH;
      export GOWORK=off;
      cd /app/sigil/apps/plugin && mage -v watch &
      cd /app/sigil && pnpm run dev"
    healthcheck:
      test: test -f /app/sigil/apps/plugin/dist/plugin.json
      interval: 10s
      timeout: 5s
      retries: 30

  sigil:
    profiles: ['core']
    build:
      context: .
      dockerfile: .config/Dockerfile.sigil
    working_dir: /app/sigil
    command: air -c .air.toml
    environment:
      SIGIL_HTTP_ADDR: :8080
      SIGIL_OTLP_GRPC_ADDR: :4317
      SIGIL_TARGET: all
      SIGIL_AUTH_ENABLED: false
      SIGIL_FAKE_TENANT_ID: fake
      SIGIL_QUERY_PROXY_PROMETHEUS_BASE_URL: http://prometheus:9090
      SIGIL_QUERY_PROXY_TEMPO_BASE_URL: http://tempo:3200
      SIGIL_QUERY_PROXY_TIMEOUT: 30s
      SIGIL_STORAGE_BACKEND: mysql
      SIGIL_MYSQL_DSN: sigil:sigil@tcp(mysql:3306)/sigil?parseTime=true
      SIGIL_OBJECT_STORE_BACKEND: s3
      SIGIL_OBJECT_STORE_ENDPOINT: http://minio:9000
      SIGIL_OBJECT_STORE_BUCKET: sigil
      SIGIL_OBJECT_STORE_ACCESS_KEY: minioadmin
      SIGIL_OBJECT_STORE_SECRET_KEY: minioadmin
      SIGIL_OBJECT_STORE_INSECURE: "true"
      SIGIL_COMPACTOR_COMPACT_INTERVAL: 1m
      SIGIL_COMPACTOR_TRUNCATE_INTERVAL: 5m
      SIGIL_COMPACTOR_RETENTION: 1h
      SIGIL_COMPACTOR_BATCH_SIZE: 250
      SIGIL_COMPACTOR_LEASE_TTL: 30s
      SIGIL_COMPACTOR_SHARD_COUNT: 1
      SIGIL_COMPACTOR_SHARD_WINDOW_SECONDS: 60
      SIGIL_COMPACTOR_WORKERS: 1
      SIGIL_COMPACTOR_CYCLE_BUDGET: 30s
      SIGIL_COMPACTOR_CLAIM_TTL: 5m
      SIGIL_COMPACTOR_TARGET_BLOCK_BYTES: 67108864
      SIGIL_MODEL_CARDS_SYNC_INTERVAL: 30m
      SIGIL_MODEL_CARDS_LEASE_TTL: 2m
      SIGIL_MODEL_CARDS_SOURCE_TIMEOUT: 15s
      SIGIL_MODEL_CARDS_STALE_SOFT: 2h
      SIGIL_MODEL_CARDS_STALE_HARD: 24h
      SIGIL_MODEL_CARDS_BOOTSTRAP_MODE: snapshot-first
    volumes:
      - ./sigil:/app/sigil
      - sigil-go-cache:/opt/go-cache
    ports:
      - '8080:8080'
      - '4317:4317'
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started

  alloy:
    profiles: ['core']
    image: grafana/alloy:v1.13.2@sha256:8abcd0d97a97099cabb34be8dcfc448fca6c35931ae9291aaf74056105dedcca
    command:
      - run
      - /etc/alloy/config.river
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    ports:
      - '14317:4317'
      - '4318:4318'
      - '12345:12345'
    volumes:
      - ./config/alloy/config.river:/etc/alloy/config.river:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - sigil-data-alloy:/var/lib/alloy/data
    depends_on:
      tempo:
        condition: service_started
      prometheus:
        condition: service_started

  sdk-traffic:
    profiles: ['core']
    build:
      context: .
      dockerfile: .config/Dockerfile.sdk-traffic
    working_dir: /app/sigil
    command: bash .config/devex/sdk-traffic/run-all.sh
    environment:
      SIGIL_TRAFFIC_INTERVAL_MS: "2000"
      SIGIL_TRAFFIC_STREAM_PERCENT: "30"
      SIGIL_TRAFFIC_CONVERSATIONS: "3"
      SIGIL_TRAFFIC_ROTATE_TURNS: "24"
      SIGIL_TRAFFIC_CUSTOM_PROVIDER: mistral
      SIGIL_TRAFFIC_GEN_HTTP_ENDPOINT: http://sigil:8080/api/v1/generations:export
      SIGIL_TRAFFIC_GEN_GRPC_ENDPOINT: sigil:4317
      SIGIL_TRAFFIC_TRACE_HTTP_ENDPOINT: http://alloy:4318/v1/traces
      SIGIL_TRAFFIC_TRACE_GRPC_ENDPOINT: alloy:4317
      SIGIL_TRAFFIC_ONESHOT: ${SIGIL_TRAFFIC_ONESHOT:-0}
      SIGIL_TRAFFIC_MAX_CYCLES: ${SIGIL_TRAFFIC_MAX_CYCLES:-0}
      SIGIL_TRAFFIC_ASSERT_TIMEOUT_SECONDS: ${SIGIL_TRAFFIC_ASSERT_TIMEOUT_SECONDS:-180}
      SIGIL_TRAFFIC_ENABLE_DOTNET: ${SIGIL_TRAFFIC_ENABLE_DOTNET:-auto}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
    volumes:
      - ./:/app/sigil
      - sigil-go-cache:/opt/go-cache
      - sigil-pnpm-store:/opt/pnpm-store
      - sigil-node-modules:/app/sigil/node_modules/
      - sigil-pip-cache:/opt/pip-cache
      - sigil-gradle-cache:/opt/gradle-cache
      - sigil-nuget-cache:/opt/nuget-cache
    depends_on:
      plugin-precache:
        condition: service_completed_successfully
      sigil:
        condition: service_started
      alloy:
        condition: service_started

  mysql:
    profiles: ['core']
    image: mysql:9.6@sha256:e5dc14f6e01c3e577e669337d2855c6d1561b30d8ef2c592e63e4e8a9a52650a
    command: --max_connections=1000
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sigil
      MYSQL_USER: sigil
      MYSQL_PASSWORD: sigil
    ports:
      - '3306:3306'
    volumes:
      - sigil-data-mysql:/var/lib/mysql
      - ./.config/mysql-bootstrap.sql:/docker-entrypoint-initdb.d/00-bootstrap.sql:ro
    healthcheck:
      test: mysql -usigil -psigil sigil -e 'select 1'
      timeout: 1s
      retries: 30

  tempo:
    profiles: ['core']
    image: grafana/tempo:2.10.1@sha256:9371af1b75b4e057eb77f22dc4dd4d9176cd6985e29f181527be6723b7f29c41
    command: ['-config.file=/etc/tempo/tempo.yaml']
    ports:
      - '3200:3200'
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - sigil-data-tempo:/var/tempo

  prometheus:
    profiles: ['core']
    image: prom/prometheus:v3.9.1@sha256:1f0f50f06acaceb0f5670d2c8a658a599affe7b0d8e78b898c1035653849a702
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=24h
      - --web.enable-otlp-receiver
    ports:
      - '9090:9090'
    volumes:
      - ./config/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - sigil-data-prometheus:/prometheus

  minio:
    profiles: ['core']
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - sigil-data-minio:/data

volumes:
  sigil-go-cache:
  sigil-pnpm-store:
  sigil-node-modules:
  sigil-plugin-dist:
  sigil-pip-cache:
  sigil-gradle-cache:
  sigil-nuget-cache:
  sigil-data-mysql:
  sigil-data-tempo:
  sigil-data-prometheus:
  sigil-data-alloy:
  sigil-data-minio:
