services:
  grafana:
    profiles: ['core']
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    depends_on:
      plugin:
        condition: service_healthy
      mysql:
        condition: service_healthy
      tempo:
        condition: service_started
    environment:
      GF_DATABASE_TYPE: mysql
      GF_DATABASE_HOST: mysql:3306
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: sigil
      GF_DATABASE_PASSWORD: sigil
      GF_SESSION_PROVIDER: mysql
      GF_SESSION_PROVIDER_CONFIG: sigil:sigil@tcp(mysql:3306)/grafana
      GF_APP_URL: http://grafana:3000
      GF_SERVER_ROOT_URL: http://grafana:3000
      GF_FEATURE_TOGGLES_ENABLE: externalServiceAccounts

  plugin-precache:
    profiles: ['core']
    build:
      context: .
      dockerfile: .config/Dockerfile.plugin
    volumes:
      - ./:/app/sigil
      - sigil-go-cache:/opt/go-cache
      - sigil-pnpm-store:/opt/pnpm-store
      - sigil-node-modules:/app/sigil/node_modules/
      - sigil-plugin-dist:/app/sigil/apps/plugin/dist/
    working_dir: /app/sigil
    command: sh -c "pnpm install && cd apps/plugin && mage -v build:linux build:linuxarm64"

  plugin:
    profiles: ['core']
    build:
      context: .
      dockerfile: .config/Dockerfile.plugin
    depends_on:
      plugin-precache:
        condition: service_completed_successfully
    ports:
      - '35729:35729'
      - '35728:35728'
    volumes:
      - ./:/app/sigil
      - sigil-go-cache:/opt/go-cache
      - sigil-pnpm-store:/opt/pnpm-store
      - sigil-node-modules:/app/sigil/node_modules/
      - sigil-plugin-dist:/app/sigil/apps/plugin/dist/
    working_dir: /app/sigil
    command: sh -c "cd apps/plugin && pnpm run dev"
    healthcheck:
      test: test -f /app/sigil/apps/plugin/dist/plugin.json
      interval: 10s
      timeout: 5s
      retries: 30

  api:
    profiles: ['core']
    build:
      context: .
      dockerfile: .config/Dockerfile.api
    working_dir: /app/api
    command: air -c .air.toml
    environment:
      SIGIL_HTTP_ADDR: :8080
      SIGIL_OTLP_GRPC_ADDR: :4317
      SIGIL_OTLP_HTTP_ADDR: :4318
      SIGIL_TEMPO_OTLP_ENDPOINT: tempo:4317
      SIGIL_STORAGE_BACKEND: mysql
      SIGIL_MYSQL_DSN: sigil:sigil@tcp(mysql:3306)/sigil?parseTime=true
      SIGIL_OBJECT_STORE_ENDPOINT: http://minio:9000
      SIGIL_OBJECT_STORE_BUCKET: sigil
      SIGIL_PAYLOAD_MAX_BYTES: 8192
    volumes:
      - ./api:/app/api
      - sigil-go-cache:/opt/go-cache
    ports:
      - '8080:8080'
      - '4317:4317'
      - '4318:4318'
    depends_on:
      mysql:
        condition: service_healthy
      tempo:
        condition: service_started

  mysql:
    profiles: ['core']
    image: mysql:9.6@sha256:db32c8ec843c042a728efb0ac7aa814d6f010eaac8923e20ae0a849d09c5baf8
    command: --max_connections=1000
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sigil
      MYSQL_USER: sigil
      MYSQL_PASSWORD: sigil
    ports:
      - '3306:3306'
    volumes:
      - sigil-data-mysql:/var/lib/mysql
      - ./.config/mysql-bootstrap.sql:/docker-entrypoint-initdb.d/00-bootstrap.sql:ro
    healthcheck:
      test: mysql -usigil -psigil sigil -e 'select 1'
      timeout: 1s
      retries: 30

  tempo:
    profiles: ['core']
    image: grafana/tempo:2.8.2
    command: ['-config.file=/etc/tempo/tempo.yaml']
    ports:
      - '3200:3200'
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - sigil-data-tempo:/var/tempo

  minio:
    profiles: ['object']
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - sigil-data-minio:/data

volumes:
  sigil-go-cache:
  sigil-pnpm-store:
  sigil-node-modules:
  sigil-plugin-dist:
  sigil-data-mysql:
  sigil-data-tempo:
  sigil-data-minio:
